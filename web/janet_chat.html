<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Janet Chat</title>
  <style>
    :root {
      --bg: #1e1e1e;
      --panel: #2a2a2a;
      --border: #3d3d3d;
      --text: #e8e8e8;
      --muted: #9a9a9a;
      --accent: #4caf93;
      --user: #3d5a80;
      --rec: #c94c4c;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0; background: var(--bg); color: var(--text);
      height: 100vh; display: flex; flex-direction: column;
    }
    header {
      padding: 10px 14px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      background: var(--panel);
    }
    header h1 { font-size: 15px; font-weight: 600; margin: 0; }
    header .status { font-size: 12px; color: var(--muted); }
    select, button, textarea {
      font: inherit; border-radius: 6px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text);
    }
    select { padding: 6px 10px; min-width: 120px; }
    header label.ctl { font-size: 12px; display: inline-flex; align-items: center; gap: 6px; color: var(--muted); }
    #msgs {
      flex: 1; overflow-y: auto; padding: 14px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .bubble {
      max-width: 92%; padding: 10px 14px; border-radius: 12px;
      line-height: 1.45; white-space: pre-wrap; word-break: break-word;
    }
    .bubble.user { align-self: flex-end; background: var(--user); }
    .bubble.asst { align-self: flex-start; background: var(--panel); border: 1px solid var(--border); }
    .bubble.role { font-size: 10px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
    footer {
      padding: 10px 14px; border-top: 1px solid var(--border);
      background: var(--panel); display: flex; gap: 10px; align-items: flex-end;
    }
    textarea {
      flex: 1; min-height: 52px; max-height: 160px; resize: vertical;
      padding: 10px 12px;
    }
    button#send {
      padding: 10px 18px; background: var(--accent); color: #0d1f1a;
      border: none; font-weight: 600; cursor: pointer;
    }
    button#send:disabled { opacity: 0.5; cursor: not-allowed; }
    button#mic {
      padding: 10px 14px; border: 1px solid var(--border); cursor: pointer;
      min-width: 48px; background: var(--bg);
    }
    button#mic.recording {
      background: var(--rec); border-color: #ff8080; color: #fff;
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse { 50% { opacity: 0.85; } }
    .err { color: #f47171; font-size: 13px; padding: 0 14px 8px; }
    .hint { font-size: 11px; color: var(--muted); padding: 0 14px 6px; }
  </style>
</head>
<body data-api-key="__JANET_API_KEY__">
  <header>
    <h1>Janet</h1>
    <span class="status" id="status">Connecting…</span>
    <label>
      <span class="status">Model</span>
      <select id="model"></select>
    </label>
    <label class="ctl"><input type="checkbox" id="speakAloud" checked> Read replies</label>
    <label>
      <span class="status">TTS</span>
      <select id="speakLang" title="Language sent to /api/speak">
        <option value="auto" selected>auto</option>
        <option value="en">en</option>
        <option value="hr">hr</option>
      </select>
    </label>
    <label>
      <span class="status">Mic STT</span>
      <select id="sttLang" title="Whisper hint (optional)">
        <option value="" selected>auto</option>
        <option value="en">en</option>
        <option value="hr">hr</option>
      </select>
    </label>
    <button type="button" id="newchat" title="New session">New chat</button>
  </header>
  <div class="hint" id="micHint">Hold 🎤 to record; release to transcribe (local Whisper). Uses PATCH /api/tts/tldr-defaults for Lana when you leave TTS as auto/hr.</div>
  <div id="err" class="err" hidden></div>
  <div id="msgs"></div>
  <footer>
    <button type="button" id="mic" title="Hold to speak">🎤</button>
    <textarea id="input" placeholder="Type or use the mic… (Enter to send, Shift+Enter for line)" rows="2"></textarea>
    <button type="button" id="send">Send</button>
  </footer>
  <script>
(function () {
  const apiKey = document.body.getAttribute('data-api-key') || '';
  const msgs = document.getElementById('msgs');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const micBtn = document.getElementById('mic');
  const statusEl = document.getElementById('status');
  const modelSel = document.getElementById('model');
  const errEl = document.getElementById('err');
  const speakAloud = document.getElementById('speakAloud');
  const speakLang = document.getElementById('speakLang');
  const sttLang = document.getElementById('sttLang');
  let sessionId = sessionStorage.getItem('janet_chat_session');
  if (!sessionId) {
    sessionId = crypto.randomUUID();
    sessionStorage.setItem('janet_chat_session', sessionId);
  }
  const thread = [];

  let mediaStream = null;
  let mediaRec = null;
  let mediaChunks = [];
  let micPressed = false;

  function authHeaders(jsonBody) {
    const h = {};
    if (jsonBody) h['Content-Type'] = 'application/json';
    if (apiKey && apiKey !== 'none') h['Authorization'] = 'Bearer ' + apiKey;
    return h;
  }

  function authHeadersMultipart() {
    const h = {};
    if (apiKey && apiKey !== 'none') h['Authorization'] = 'Bearer ' + apiKey;
    return h;
  }

  function showErr(t) {
    errEl.textContent = t;
    errEl.hidden = !t;
  }

  function appendBubble(role, text) {
    const wrap = document.createElement('div');
    wrap.className = 'bubble ' + (role === 'user' ? 'user' : 'asst');
    const r = document.createElement('div');
    r.className = 'role';
    r.textContent = role === 'user' ? 'You' : 'Janet';
    wrap.appendChild(r);
    wrap.appendChild(document.createTextNode(text));
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function speakReply(text) {
    if (!speakAloud.checked || !text.trim()) return;
    const lang = speakLang.value || 'auto';
    fetch('/api/speak', {
      method: 'POST',
      headers: authHeaders(true),
      body: JSON.stringify({ text: text.trim(), lang: lang })
    }).catch(function () {});
  }

  function pickMimeType() {
    const c = [
      'audio/webm;codecs=opus',
      'audio/webm',
      'audio/mp4',
    ];
    for (let i = 0; i < c.length; i++) {
      if (MediaRecorder.isTypeSupported(c[i])) return c[i];
    }
    return '';
  }

  async function micStart() {
    if (micPressed) return;
    micPressed = true;
    showErr('');
    micBtn.classList.add('recording');
    try {
      mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const mime = pickMimeType();
      const opts = mime ? { mimeType: mime } : {};
      mediaRec = new MediaRecorder(mediaStream, opts);
      mediaChunks = [];
      mediaRec.ondataavailable = function (e) {
        if (e.data && e.data.size) mediaChunks.push(e.data);
      };
      mediaRec.start();
    } catch (e) {
      micPressed = false;
      micBtn.classList.remove('recording');
      showErr('Microphone: ' + (e.message || String(e)));
    }
  }

  async function micStop() {
    if (!micPressed || !mediaRec) {
      micPressed = false;
      micBtn.classList.remove('recording');
      return;
    }
    micPressed = false;
    micBtn.classList.remove('recording');
    const rec = mediaRec;
    mediaRec = null;
    try {
      if (rec.state === 'recording') rec.stop();
    } catch (_) {}
    if (mediaStream) {
      mediaStream.getTracks().forEach(function (t) { t.stop(); });
      mediaStream = null;
    }
    await new Promise(function (resolve) {
      rec.onstop = resolve;
      setTimeout(resolve, 500);
    });
    if (!mediaChunks.length) {
      showErr('No audio captured.');
      return;
    }
    const blob = new Blob(mediaChunks, { type: rec.mimeType || 'audio/webm' });
    const ext = (blob.type || '').indexOf('mp4') >= 0 ? 'm4a' : 'webm';
    const fd = new FormData();
    fd.append('audio', blob, 'recording.' + ext);
    let url = '/api/transcribe';
    const hl = sttLang.value;
    if (hl) url += '?language=' + encodeURIComponent(hl);
    sendBtn.disabled = true;
    try {
      const r = await fetch(url, { method: 'POST', headers: authHeadersMultipart(), body: fd });
      const raw = await r.text();
      if (!r.ok) {
        let detail = raw;
        try { detail = JSON.parse(raw).detail || raw; } catch (_) {}
        throw new Error(typeof detail === 'string' ? detail : JSON.stringify(detail));
      }
      const data = JSON.parse(raw);
      const t = (data.text || '').trim();
      if (!t) {
        showErr('Empty transcript. Try again or check Whisper/ffmpeg on the server.');
        return;
      }
      input.value = (input.value ? input.value.trim() + ' ' : '') + t;
      input.focus();
    } catch (e) {
      showErr(String(e.message || e));
    } finally {
      sendBtn.disabled = false;
    }
  }

  micBtn.addEventListener('mousedown', function (e) { e.preventDefault(); micStart(); });
  micBtn.addEventListener('mouseup', function () { micStop(); });
  micBtn.addEventListener('mouseleave', function () { if (micPressed) micStop(); });
  micBtn.addEventListener('touchstart', function (e) { e.preventDefault(); micStart(); }, { passive: false });
  micBtn.addEventListener('touchend', function (e) { e.preventDefault(); micStop(); });
  micBtn.addEventListener('touchcancel', function () { micStop(); });

  async function loadHealth() {
    try {
      const r = await fetch('/health');
      if (!r.ok) throw new Error('API not healthy');
      const d = await r.json();
      statusEl.textContent = 'Online · ' + (d.current_model || '');
      modelSel.innerHTML = '';
      const avail = d.available_models || [];
      const cur = d.current_model || avail[0] || 'qwen2.5-coder:7b';
      avail.forEach(m => {
        const o = document.createElement('option');
        o.value = m;
        o.textContent = m;
        if (m === cur) o.selected = true;
        modelSel.appendChild(o);
      });
      if (!avail.length) {
        const o = document.createElement('option');
        o.value = cur;
        o.textContent = cur;
        modelSel.appendChild(o);
      }
      showErr('');
    } catch (e) {
      statusEl.textContent = 'Offline';
      showErr('Cannot reach Janet API. Start the server from the menu bar.');
    }
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;
    showErr('');
    input.value = '';
    thread.push({ role: 'user', content: text });
    appendBubble('user', text);
    sendBtn.disabled = true;
    const model = modelSel.value || 'qwen2.5-coder:7b';
    const body = {
      model,
      messages: thread.map(m => ({ role: m.role, content: m.content })),
      stream: false,
      session_id: sessionId
    };
    try {
      const r = await fetch('/v1/chat/completions', {
        method: 'POST',
        headers: authHeaders(true),
        body: JSON.stringify(body)
      });
      const raw = await r.text();
      if (!r.ok) {
        let detail = raw;
        try { detail = JSON.parse(raw).detail || raw; } catch (_) {}
        throw new Error(typeof detail === 'string' ? detail : JSON.stringify(detail));
      }
      const data = JSON.parse(raw);
      const ans = data.choices && data.choices[0] && data.choices[0].message
        ? data.choices[0].message.content : '(no reply)';
      thread.push({ role: 'assistant', content: ans });
      appendBubble('assistant', ans);
      speakReply(ans);
    } catch (e) {
      showErr(String(e.message || e));
      thread.pop();
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  document.getElementById('newchat').onclick = function () {
    sessionId = crypto.randomUUID();
    sessionStorage.setItem('janet_chat_session', sessionId);
    thread.length = 0;
    msgs.innerHTML = '';
    showErr('');
  };

  sendBtn.onclick = sendMessage;
  input.addEventListener('keydown', function (ev) {
    if (ev.key === 'Enter' && !ev.shiftKey) {
      ev.preventDefault();
      sendMessage();
    }
  });

  loadHealth();
  setInterval(loadHealth, 30000);
})();
  </script>
</body>
</html>
